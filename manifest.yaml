# comfy-provisioner manifest — single source of truth for every downloadable asset.
#
# Fields per entry:
#   name:        unique slug
#   source:      huggingface | civitai | url
#   repo/file:   (huggingface) repo id + path inside repo
#   model_id/version_id/file: (civitai) numeric ids + expected filename
#   url:         (url source) direct download link
#   dest:        ComfyUI subfolder the file lands in
#   rename:      optional friendlier local filename
#   sha256:      expected hash (verified after download when present)
#   size_gb:     approximate, for --dry-run totals
#   tags:        video | image | required | optional
#   profiles:    which hardware profiles pull this entry
#
# Profiles: local-12gb (GGUF/fp8, lean), local-24gb (fp8), cloud (fp8, 24-48GB pod),
#           cloud-80gb (fp16 where available).
#
# All IDs/hashes below were resolved live from the Civitai / Hugging Face APIs on
# 2026-07-02. `provision.py verify --refresh` re-checks them against the APIs.
#
# SCOPE GUARD: image-driven only. I2V video + img2img/reference image workflows.
# No T2V or T2I model variants belong in this file.

